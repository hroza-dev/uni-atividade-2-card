<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card: Harry Potter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="card-img">
            <!-- img no css -->
        </div>
        <div class="card-content">
            <h3 class="titulo">Harry Potter (Relíquias da Morte)</h3>
            <span class="tipo" style="color: rgb(149, 149, 255);">Herói <strong style="color: #eee;">|</strong> <span
                    style="color: rgb(165, 87, 165);">Bruxo</span></span>
            <p>O Menino que Sobreviveu.</p>
            <div class="status">
                <div class="stat">
                    <span>VIDA</span>
                    <div class="barra">
                        <div class="progresso vida"></div>
                    </div>
                </div>
                <div class="stat">
                    <span>ATAQUE</span>
                    <div class="barra">
                        <div class="progresso ataque"></div>
                    </div>
                </div>
                <div class="stat">
                    <span>DEFESA</span>
                    <div class="barra">
                        <div class="progresso defesa"></div>
                    </div>
                </div>
                <div class="stat">
                    <span>PODER</span>
                    <div class="barra">
                        <div class="progresso poder"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
